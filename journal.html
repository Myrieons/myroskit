<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYROSKIT — Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0d0d0f;
    --bg-secondary: rgba(28, 29, 32, 0.65);
    --bg-tertiary: rgba(33, 34, 38, 0.6);
    --bg-hover: rgba(38, 39, 44, 0.75);
    --accent: #6b6f76;
    --accent-hover: #55585e;
    --accent-rgb: 107, 111, 118;
    --text-primary: #f2f3f5;
    --text-secondary: #b5bac1;
    --text-muted: #80848e;
    --border: rgba(255, 255, 255, 0.08);
    --border-subtle: rgba(255, 255, 255, 0.04);
    --radius: 12px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
  .page { max-width: 960px; margin: 0 auto; padding: 28px 24px; }

  /* ── Top ── */
  .topline { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .wordmark { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .wordmark .myros { color: var(--text-primary); }
  .wordmark .kit   { color: var(--accent); }
  .btn-logout { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); font-family: inherit; font-size: 12px; font-weight: 600; padding: 5px 12px; cursor: pointer; transition: color 0.1s, border-color 0.1s; }
  .btn-logout:hover { color: var(--text-primary); border-color: var(--text-muted); }

  /* ── Info cards ── */
  .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .info-card { position: relative; background: var(--bg-secondary); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 14px; min-width: 0; overflow: hidden; isolation: isolate; min-height: 90px; }
  .info-card::before { content: ''; position: absolute; inset: 0; background-image: var(--banner-url, none); background-size: cover; background-position: center; filter: blur(8px) brightness(0.35); transform: scale(1.08); z-index: 0; opacity: 0; transition: opacity 0.3s ease; }
  .info-card.has-banner::before { opacity: 1; }
  .info-card::after { content: ''; position: absolute; inset: 0; background: var(--color-tint, transparent); opacity: 0.18; z-index: 0; pointer-events: none; }
  .info-card > * { position: relative; z-index: 1; }
  .info-card-label { position: absolute; top: 10px; right: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); opacity: 0.6; z-index: 1; }
  .info-text { min-width: 0; flex: 1; }
  .info-name-row { display: flex; align-items: baseline; gap: 6px; min-width: 0; }
  .info-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-pronouns { font-size: 12px; color: var(--text-secondary); opacity: 0.45; white-space: nowrap; flex-shrink: 0; }
  .info-id { font-size: 11px; color: var(--text-muted); font-family: 'Courier New', monospace; margin-top: 3px; }
  .avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--bg-tertiary); border: 2px solid var(--border); }
  .avatar-initials { width: 56px; height: 56px; border-radius: 50%; background: var(--bg-tertiary); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; }
  #system-card img, #fronter-card img { width: 56px !important; height: 56px !important; min-width: 56px; min-height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  /* ── Nav ── */
  .nav-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .nav-tab { background: rgba(49,51,56,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 16px; cursor: pointer; user-select: none; transition: background 0.1s, color 0.1s, border-color 0.1s; flex: 1; text-align: center; white-space: nowrap; text-decoration: none; display: block; }
  .nav-tab.active { background: #1e1f22; border-color: rgba(255,255,255,0.14); color: var(--text-primary); }
  .nav-tab:hover:not(.active) { background: var(--bg-hover); color: var(--text-primary); }

  /* ── Outer content box ── */
  .content-box { background: var(--bg-secondary); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  /* ── Sub-tabs ── */
  .sub-tabs { display: flex; border-bottom: 1px solid var(--border-subtle); }
  .sub-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 13px 22px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-muted); font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
    white-space: nowrap; user-select: none;
  }
  .sub-tab svg { opacity: 0.6; transition: opacity 0.15s; flex-shrink: 0; }
  .sub-tab.active { color: var(--text-primary); border-bottom-color: rgba(255,255,255,0.35); }
  .sub-tab.active svg { opacity: 1; }
  .sub-tab:hover:not(.active) { color: var(--text-secondary); }
  .sub-tab:hover:not(.active) svg { opacity: 0.8; }

  .sub-panel { display: none; }
  .sub-panel.active { display: block; }

  /* ════════════════════════════════
     JOURNAL PANEL
  ════════════════════════════════ */
  .journal-body { display: grid; grid-template-columns: 320px 1fr; }

  /* compose column */
  .compose-col { border-right: 1px solid var(--border-subtle); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .compose-col-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); }
  .compose-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg-tertiary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; overflow: hidden; }
  .compose-row { display: flex; gap: 10px; align-items: flex-start; }
  .compose-fields { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  /* author picker */
  .author-picker-wrap { position: relative; width: 100%; }
  .author-picker-btn {
    width: 100%; background: rgba(15,15,17,0.5); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit;
    font-size: 12px; padding: 6px 10px; outline: none; transition: border-color 0.15s;
    cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px;
  }
  .author-picker-btn:hover, .author-picker-btn:focus { border-color: rgba(255,255,255,0.2); }
  .author-picker-btn .apb-av {
    width: 20px; height: 20px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700;
  }
  .author-picker-btn .apb-av img { width: 100%; height: 100%; object-fit: cover; }
  .author-picker-btn .apb-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .author-picker-btn .apb-chevron { color: var(--text-muted); flex-shrink: 0; transition: transform 0.2s; }
  .author-picker-btn.open .apb-chevron { transform: rotate(180deg); }

  .author-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 50;
    background: #1e1f22; border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow: hidden; display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .author-dropdown.open { display: block; }
  .author-dropdown-search {
    width: 100%; background: rgba(15,15,17,0.6); border: none; border-bottom: 1px solid var(--border-subtle);
    color: var(--text-primary); font-family: inherit; font-size: 12px; padding: 8px 10px;
    outline: none;
  }
  .author-dropdown-search::placeholder { color: var(--text-muted); }
  .author-dropdown-list { max-height: 180px; overflow-y: auto; }
  .author-dropdown-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; cursor: pointer; transition: background 0.1s;
  }
  .author-dropdown-item:hover { background: rgba(255,255,255,0.04); }
  .author-dropdown-item.selected { background: rgba(107,111,118,0.12); }
  .author-dropdown-item .adi-av {
    width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700;
  }
  .author-dropdown-item .adi-av img { width: 100%; height: 100%; object-fit: cover; }
  .author-dropdown-item .adi-name { font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .author-dropdown-item .adi-check { color: var(--accent); flex-shrink: 0; }
  .author-dropdown-item.none-item .adi-name { color: var(--text-muted); font-style: italic; }

  /* tag manager */
  .compose-tags-row { display: flex; align-items: center; gap: 6px; }
  .compose-tags { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .tag-mgr-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-muted); cursor: pointer; padding: 3px 6px; flex-shrink: 0;
    display: flex; align-items: center; transition: color 0.1s, border-color 0.1s;
  }
  .tag-mgr-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.18); }

  /* tag manager modal list */
  .tag-mgr-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
  .tag-mgr-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 10px;
  }
  .tag-mgr-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tag-mgr-name { flex: 1; font-size: 12px; color: var(--text-secondary); }
  .tag-mgr-del {
    background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px;
    border-radius: 3px; display: flex; align-items: center; transition: color 0.1s;
  }
  .tag-mgr-del:hover { color: #f38ba8; }
  .tag-add-row { display: flex; gap: 6px; margin-top: 8px; }
  .tag-add-input {
    flex: 1; background: rgba(15,15,17,0.5); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit;
    font-size: 12px; padding: 6px 10px; outline: none; transition: border-color 0.15s;
  }
  .tag-add-input:focus { border-color: rgba(255,255,255,0.2); }
  .tag-add-input::placeholder { color: var(--text-muted); }
  .tag-color-swatches { display: flex; gap: 4px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .tag-color-dot {
    width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
  }
  .tag-color-dot:hover { transform: scale(1.15); }
  .tag-color-dot.selected { border-color: #fff; transform: scale(1.1); }

  .compose-textarea { width: 100%; background: rgba(15,15,17,0.5); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 13px; line-height: 1.5; padding: 8px 10px; outline: none; resize: vertical; min-height: 100px; transition: border-color 0.15s; }
  .compose-textarea:focus { border-color: rgba(255,255,255,0.2); }
  .compose-textarea::placeholder { color: var(--text-muted); }
  .compose-tag { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 99px; color: var(--text-muted); font-size: 11px; font-weight: 600; padding: 3px 10px; cursor: pointer; transition: background 0.1s, color 0.1s, border-color 0.1s; user-select: none; }
  .compose-tag.active { color: var(--text-secondary); border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }
  .compose-tag:hover:not(.active) { background: var(--bg-hover); color: var(--text-primary); }
  .btn-post { background: var(--accent); border: none; border-radius: var(--radius-sm); color: #fff; font-family: inherit; font-size: 13px; font-weight: 700; padding: 9px 20px; cursor: pointer; transition: background 0.15s, transform 0.1s; width: 100%; }
  .btn-post:hover { background: var(--accent-hover); }
  .btn-post:active { transform: scale(0.98); }

  /* entries column */
  .entries-col { display: flex; flex-direction: column; min-height: 0; }
  .entries-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); }
  .search-input { flex: 1; background: rgba(15,15,17,0.4); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 12px; padding: 6px 10px; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: rgba(255,255,255,0.2); }
  .search-input::placeholder { color: var(--text-muted); }
  .filter-pill { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 99px; color: var(--text-muted); font-family: inherit; font-size: 11px; font-weight: 600; padding: 4px 10px; cursor: pointer; transition: background 0.1s, color 0.1s, border-color 0.1s; white-space: nowrap; }
  .filter-pill.active { background: rgba(107,111,118,0.2); color: var(--text-secondary); border-color: var(--accent); }
  .filter-pill:hover:not(.active) { background: var(--bg-hover); color: var(--text-primary); }

  .entries-list { overflow-y: auto; }
  .entry { padding: 13px 14px; border-bottom: 1px solid var(--border-subtle); animation: fadeUp 0.2s ease both; transition: background 0.1s; }
  .entry:last-child { border-bottom: none; }
  .entry:hover { background: rgba(255,255,255,0.02); }
  .entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .entry-avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; background: var(--bg-tertiary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; overflow: hidden; }
  .entry-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .entry-meta { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 6px; }
  .entry-author { font-size: 12px; font-weight: 700; color: var(--text-primary); }
  .entry-time { font-size: 11px; color: var(--text-muted); }
  .entry-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
  .entry-tag { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 99px; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-muted); }
  .tag-vent    { background: rgba(201,123,138,0.15); color: #c97b8a; border-color: rgba(201,123,138,0.3); }
  .tag-happy   { background: rgba(123,201,138,0.15); color: #7bc98a; border-color: rgba(123,201,138,0.3); }
  .tag-anxious { background: rgba(201,160,123,0.15); color: #c9a07b; border-color: rgba(201,160,123,0.3); }
  .tag-check   { background: rgba(123,173,201,0.15); color: #7badc9; border-color: rgba(123,173,201,0.3); }
  .tag-memory  { background: rgba(138,123,201,0.15); color: #8a7bc9; border-color: rgba(138,123,201,0.3); }
  .tag-note    { background: rgba(255,255,255,0.06); color: var(--text-muted); border-color: var(--border); }
  /* entry body: collapsed = 1 line, expanded = full */
  .entry-body {
    font-size: 13px; line-height: 1.65; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    word-break: break-word; cursor: pointer;
    transition: color 0.1s;
  }
  .entry-body:hover { color: var(--text-primary); }
  .entry.expanded .entry-body {
    white-space: pre-wrap; overflow: visible; text-overflow: unset; cursor: default;
  }
  .entry.expanded .entry-body:hover { color: var(--text-secondary); }

  /* chevron toggle */
  .entry-chevron {
    flex-shrink: 0; color: var(--text-muted); transition: transform 0.2s, color 0.1s;
    display: flex; align-items: center;
  }
  .entry.expanded .entry-chevron { transform: rotate(180deg); }

  .entry-actions { display: flex; gap: 4px; margin-top: 8px; display: none; }
  .entry.expanded .entry-actions { display: flex; }
  .entry-action-btn { background: none; border: none; color: var(--text-muted); font-family: inherit; font-size: 11px; padding: 2px 6px; cursor: pointer; border-radius: 4px; transition: color 0.1s, background 0.1s; display: flex; align-items: center; gap: 3px; }
  .entry-action-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
  .entry-action-btn.danger:hover { color: #f38ba8; }

  /* edit entry modal */
  .edit-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
  .edit-tag { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 99px; color: var(--text-muted); font-size: 11px; font-weight: 600; padding: 3px 10px; cursor: pointer; transition: background 0.1s, color 0.1s, border-color 0.1s; user-select: none; }
  .edit-tag.active { background: rgba(107,111,118,0.2); color: var(--text-secondary); border-color: var(--accent); }

  /* pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 14px;
    border-top: 1px solid var(--border-subtle);
  }
  .page-btn {
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-muted); font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 5px 12px; cursor: pointer; transition: background 0.1s, color 0.1s, border-color 0.1s;
    display: flex; align-items: center; gap: 4px;
  }
  .page-btn:hover:not(:disabled) { background: var(--bg-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.14); }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-btn.active { background: #1e1f22; border-color: rgba(255,255,255,0.18); color: var(--text-primary); }
  .page-info { font-size: 11px; color: var(--text-muted); padding: 0 4px; }

  /* ════════════════════════════════
     HEADSPACE PANEL
  ════════════════════════════════ */
  .hs-tabs { display: flex; padding: 0 16px; border-bottom: 1px solid var(--border-subtle); }
  .hs-tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-muted); font-family: inherit; font-size: 12px; font-weight: 600;
    padding: 10px 14px; cursor: pointer; transition: color 0.1s, border-color 0.1s;
    white-space: nowrap; display: flex; align-items: center; gap: 6px;
  }
  .hs-tab svg { opacity: 0.55; transition: opacity 0.1s; }
  .hs-tab.active { color: var(--text-primary); border-bottom-color: var(--text-secondary); }
  .hs-tab.active svg { opacity: 1; }
  .hs-tab:hover:not(.active) { color: var(--text-secondary); }
  .hs-tab:hover:not(.active) svg { opacity: 0.75; }
  .hs-panel { display: none; }
  .hs-panel.active { display: block; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; padding: 16px; }

  /* location cards */
  .location-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; transition: border-color 0.15s; animation: fadeUp 0.2s ease both; }
  .location-card:hover { border-color: rgba(255,255,255,0.14); }
  .location-main { display: flex; align-items: center; gap: 10px; padding: 11px 12px; cursor: pointer; }
  .location-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 7px; flex-shrink: 0; color: var(--text-muted); }
  .location-info { flex: 1; min-width: 0; }
  .location-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .location-desc-short { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .loc-pips { display: flex; flex-shrink: 0; }
  .loc-pip { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-tertiary); border: 1px solid var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--text-muted); margin-left: -4px; overflow: hidden; }
  .loc-pip:first-child { margin-left: 0; }
  .loc-pip img { width: 100%; height: 100%; object-fit: cover; }
  .loc-pip-count { font-size: 11px; color: var(--text-muted); margin-left: 5px; flex-shrink: 0; align-self: center; }
  .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; transition: color 0.1s, background 0.1s; display: flex; align-items: center; flex-shrink: 0; }
  .icon-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
  .location-expand { display: none; padding: 0 12px 12px; }
  .location-card.expanded .location-expand { display: block; }
  .loc-expand-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; padding: 9px 10px; background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .loc-expand-members { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

  /* hs / role cards */
  .hs-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; animation: fadeUp 0.2s ease both; transition: border-color 0.15s; }
  .hs-card:hover { border-color: rgba(255,255,255,0.12); }
  .hs-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .hs-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .hs-card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); flex: 1; }
  .hs-cat-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; color: var(--text-muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); white-space: nowrap; }
  .hs-card-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
  .hs-linked { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .hs-linked-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-right: 2px; }

  /* shared chips */
  .member-chip { display: flex; align-items: center; gap: 5px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 99px; padding: 3px 8px 3px 4px; font-size: 11px; color: var(--text-secondary); }
  .sm-chip { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 99px; padding: 2px 8px 2px 4px; font-size: 10px; color: var(--text-muted); }
  .chip-av { width: 16px; height: 16px; border-radius: 50%; overflow: hidden; background: var(--bg-tertiary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
  .chip-av-sm { width: 14px; height: 14px; border-radius: 50%; overflow: hidden; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; }
  .chip-av img, .chip-av-sm img { width: 100%; height: 100%; object-fit: cover; }

  /* add button */
  .add-row { padding: 0 16px 16px; }
  .add-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px dashed rgba(255,255,255,0.1); border-radius: var(--radius-sm); color: var(--text-muted); font-family: inherit; font-size: 12px; font-weight: 600; padding: 9px 14px; cursor: pointer; width: 100%; transition: border-color 0.1s, color 0.1s, background 0.1s; }
  .add-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-secondary); background: rgba(255,255,255,0.02); }

  /* loc icon picker */
  .loc-icon-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .loc-icon-btn { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-tertiary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.1s, background 0.1s; color: var(--text-muted); }
  .loc-icon-btn.selected { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); color: var(--text-primary); }
  .loc-icon-btn:hover:not(.selected) { background: var(--bg-hover); color: var(--text-secondary); }

  /* empty state */
  .empty-state { padding: 44px 16px; text-align: center; color: var(--text-muted); font-size: 13px; grid-column: 1 / -1; }
  .empty-state svg { opacity: 0.3; margin-bottom: 12px; }
  .empty-state p { margin-top: 4px; font-size: 12px; }

  /* ── Modals ── */
  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #1e1f22; border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; width: 100%; max-width: 440px; animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 18px; color: var(--text-primary); }
  .modal-field { margin-bottom: 14px; }
  .modal-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; }
  .modal-input, .modal-select, .modal-textarea { width: 100%; background: rgba(15,15,17,0.6); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; padding: 8px 10px; font-size: 13px; outline: none; transition: border-color 0.15s; }
  .modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: rgba(255,255,255,0.2); }
  .modal-input::placeholder, .modal-textarea::placeholder { color: var(--text-muted); }
  .modal-textarea { resize: vertical; min-height: 64px; }
  .modal-select { appearance: none; cursor: pointer; }
  .modal-member-list { max-height: 160px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); background: rgba(15,15,17,0.4); }
  .modal-member-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border-subtle); transition: background 0.1s; }
  .modal-member-item:last-child { border-bottom: none; }
  .modal-member-item:hover { background: rgba(255,255,255,0.03); }
  .modal-member-item.checked { background: rgba(107,111,118,0.08); }
  .mmi-check { width: 16px; height: 16px; border-radius: 3px; border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: transparent; transition: background 0.1s, border-color 0.1s; }
  .modal-member-item.checked .mmi-check { background: var(--accent); border-color: var(--accent); }
  .modal-member-item.checked .mmi-check::after { content: ''; width: 8px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(0,-1px); display: block; }
  .mmi-av { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; background: var(--bg-tertiary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .mmi-av img { width: 100%; height: 100%; object-fit: cover; }
  .mmi-name { font-size: 12px; color: var(--text-secondary); }
  .modal-color-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .modal-color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; }
  .modal-color-swatch:hover { transform: scale(1.15); }
  .modal-color-swatch.selected { border-color: #fff; transform: scale(1.1); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .btn-cancel { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 16px; cursor: pointer; transition: color 0.1s, border-color 0.1s; }
  .btn-cancel:hover { color: var(--text-primary); border-color: var(--text-muted); }
  .btn-save { background: var(--accent); border: none; border-radius: var(--radius-sm); color: #fff; font-family: inherit; font-size: 13px; font-weight: 700; padding: 8px 20px; cursor: pointer; transition: background 0.15s; }
  .btn-save:hover { background: var(--accent-hover); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
  * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }

  @media (max-width: 700px) {
    .journal-body { grid-template-columns: 1fr; }
    .compose-col { border-right: none; border-bottom: 1px solid var(--border-subtle); }
    .info-row { grid-template-columns: 1fr; }
    .nav-tabs { flex-wrap: wrap; }
    .nav-tab { flex: none; font-size: 12px; padding: 7px 12px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="topline">
    <div class="wordmark"><span class="myros">MYROS</span><span class="kit">KIT</span></div>
    <div style="display:flex;align-items:center;gap:6px;">
      <a class="btn-logout" href="https://github.com/Myrieons/MyrosKit" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;text-decoration:none;padding:5px 8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
      </a>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="info-row">
    <div class="info-card" id="system-card">
      <div class="skeleton" style="width:56px;height:56px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1;min-width:0"><div class="skeleton" style="height:15px;width:120px;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:80px"></div></div>
    </div>
    <div class="info-card" id="fronter-card">
      <div class="skeleton" style="width:56px;height:56px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1;min-width:0"><div class="skeleton" style="height:10px;width:60px;margin-bottom:6px"></div><div class="skeleton" style="height:15px;width:100px;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:70px"></div></div>
    </div>
  </div>

  <div class="nav-tabs">
    <a class="nav-tab" href="dashboard.html">Members</a>
    <a class="nav-tab" href="system.html">System</a>
    <a class="nav-tab" href="switches.html">Switch History</a>
    <a class="nav-tab" href="groups.html">Group List</a>
    <a class="nav-tab" href="analytics.html">Analytics</a>
    <a class="nav-tab active" href="journal.html">Journal</a>
    <a class="nav-tab" href="settings.html">Settings</a>
  </div>

  <div class="content-box">

    <!-- Sub-tabs: Journal / Headspace -->
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchSubTab('journal',this)">
        <!-- book-open -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Journal
      </button>
      <button class="sub-tab" onclick="switchSubTab('headspace',this)">
        <!-- layers / innerworld -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Headspace
      </button>
    </div>

    <!-- ════ JOURNAL SUB-PANEL ════ -->
    <div class="sub-panel active" id="sub-journal">
      <div class="journal-body">

        <!-- Compose -->
        <div class="compose-col">
          <div class="compose-col-label">New Entry · <span id="entry-count">0</span> total</div>
          <div class="compose-row">
            <div class="compose-avatar" id="compose-avatar-el">?</div>
            <div class="compose-fields">
              <!-- Author picker -->
              <div class="author-picker-wrap" id="compose-author-wrap">
                <button class="author-picker-btn" id="compose-author-btn" type="button" onclick="toggleAuthorDropdown('compose')">
                  <span class="apb-av" id="compose-apb-av">?</span>
                  <span class="apb-name" id="compose-apb-name">Who's writing? (optional)</span>
                  <span class="apb-chevron"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
                </button>
                <div class="author-dropdown" id="compose-author-dropdown">
                  <input type="text" class="author-dropdown-search" placeholder="Search members…" oninput="filterAuthorList('compose', this.value)">
                  <div class="author-dropdown-list" id="compose-author-list"></div>
                </div>
              </div>
              <textarea class="compose-textarea" id="compose-text" placeholder="Write a journal entry…"></textarea>
            </div>
          </div>
          <div class="compose-tags-row">
            <div class="compose-tags" id="compose-tag-row"></div>
            <button class="tag-mgr-btn" title="Manage tags" onclick="openTagManager()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
          <button class="btn-post" onclick="postEntry()">Post Entry</button>
        </div>

        <!-- Entries + pagination -->
        <div class="entries-col">
          <div class="entries-toolbar">
            <input type="text" class="search-input" id="journal-search" placeholder="Search entries…" oninput="filterEntries()">
            <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
            <button class="filter-pill" onclick="setFilter('mine',this)">Mine</button>
          </div>
          <div class="entries-list" id="entries-list"></div>
          <div class="pagination" id="pagination" style="display:none;"></div>
        </div>

      </div>
    </div>

    <!-- ════ HEADSPACE SUB-PANEL ════ -->
    <div class="sub-panel" id="sub-headspace">

      <!-- order: Locations → Roles & Info → Notes -->
      <div class="hs-tabs">
        <button class="hs-tab active" onclick="switchHsTab('locations',this)">
          <!-- map-pin -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Locations
        </button>
        <button class="hs-tab" onclick="switchHsTab('roles',this)">
          <!-- users -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Roles & Info
        </button>
        <button class="hs-tab" onclick="switchHsTab('notes',this)">
          <!-- file-text -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Notes
        </button>
      </div>

      <!-- Locations -->
      <div class="hs-panel active" id="hs-panel-locations">
        <div class="cards-grid" id="locations-list"></div>
        <div class="add-row">
          <button class="add-btn" onclick="openLocModal()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add location
          </button>
        </div>
      </div>

      <!-- Roles & Info -->
      <div class="hs-panel" id="hs-panel-roles">
        <div class="cards-grid" id="roles-list"></div>
        <div class="add-row">
          <button class="add-btn" onclick="openRoleModal()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add role / info
          </button>
        </div>
      </div>

      <!-- Notes (last) -->
      <div class="hs-panel" id="hs-panel-notes">
        <div class="cards-grid" id="headspace-list"></div>
        <div class="add-row">
          <button class="add-btn" onclick="openHsModal()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add note
          </button>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- ── Edit entry modal ── -->
<div class="modal-overlay" id="edit-entry-modal" onclick="bgClose(event,'edit-entry-modal')">
  <div class="modal-box">
    <div class="modal-title">Edit Entry</div>
    <div class="modal-field">
      <label class="modal-label">Author</label>
      <div class="author-picker-wrap" id="edit-author-wrap">
        <button class="author-picker-btn" id="edit-author-btn" type="button" onclick="toggleAuthorDropdown('edit')">
          <span class="apb-av" id="edit-apb-av">?</span>
          <span class="apb-name" id="edit-apb-name">System (no author)</span>
          <span class="apb-chevron"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
        </button>
        <div class="author-dropdown" id="edit-author-dropdown">
          <input type="text" class="author-dropdown-search" placeholder="Search members…" oninput="filterAuthorList('edit', this.value)">
          <div class="author-dropdown-list" id="edit-author-list"></div>
        </div>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Entry</label>
      <textarea class="modal-textarea" id="edit-entry-text" style="min-height:120px;" placeholder="Write your entry…"></textarea>
    </div>
    <div class="modal-field">
      <label class="modal-label">Tags</label>
      <div class="edit-tags" id="edit-tag-row"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('edit-entry-modal')">Cancel</button>
      <button class="btn-save" onclick="saveEditEntry()">Save</button>
    </div>
  </div>
</div>

<!-- ── Tag manager modal ── -->
<div class="modal-overlay" id="tag-mgr-modal" onclick="bgClose(event,'tag-mgr-modal')">
  <div class="modal-box">
    <div class="modal-title">Manage Tags</div>
    <div class="tag-mgr-list" id="tag-mgr-list"></div>
    <div style="margin-top:14px;">
      <label class="modal-label">Add new tag</label>
      <div class="tag-add-row">
        <input type="text" class="tag-add-input" id="tag-add-input" placeholder="Tag name…" maxlength="24">
        <button class="btn-save" style="padding:6px 14px;font-size:12px;" onclick="addCustomTag()">Add</button>
      </div>
      <div class="tag-color-swatches" id="tag-color-swatches"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('tag-mgr-modal')">Done</button>
    </div>
  </div>
</div>

<!-- ── Location modal ── -->
<div class="modal-overlay" id="loc-modal" onclick="bgClose(event,'loc-modal')">

/* ── Constants & state ── */
const API   = 'https://api.pluralkit.me/v2';
const TOKEN = sessionStorage.getItem('pk_token');
if (!TOKEN) window.location.href = 'index.html';

const JKEY = 'myroskit_journal_v1';
const LKEY = 'myroskit_locations_v1';
const HKEY = 'myroskit_hs_v1';
const RKEY = 'myroskit_roles_v1';
const TKEY = 'myroskit_tags_v1';

const PALETTE = ['#c97b8a','#7bc98a','#7badc9','#8a7bc9','#c9a07b','#c9c37b','#80848e','#b5bac1'];
const DEFAULT_TAGS = [
  { id:'vent',     label:'vent',     color:'#c97b8a' },
  { id:'happy',    label:'happy',    color:'#7bc98a' },
  { id:'anxious',  label:'anxious',  color:'#c9a07b' },
  { id:'check-in', label:'check-in', color:'#7badc9' },
  { id:'memory',   label:'memory',   color:'#8a7bc9' },
  { id:'note',     label:'note',     color:'#80848e' },
];
const PER_PAGE    = 3;
const PREVIEW_LEN = 120;

let allMembers = [], entries = [], locations = [], hsNotes = [], roles = [], customTags = [];
let editLocId = null, editHsId = null, editRoleId = null, editingEntryId = null;
let searchQ = '', currentPage = 1, filteredEntries = [];
let composeAuthorId = null, editAuthorId = null;
let tagMgrColor = PALETTE[0];

/* ── Utils ── */
function tryParse(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch{return d;}}
function saveJ(){localStorage.setItem(JKEY,JSON.stringify(entries));}
function saveL(){localStorage.setItem(LKEY,JSON.stringify(locations));}
function saveH(){localStorage.setItem(HKEY,JSON.stringify(hsNotes));}
function saveR(){localStorage.setItem(RKEY,JSON.stringify(roles));}
function saveTags(){localStorage.setItem(TKEY,JSON.stringify(customTags));}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function relTime(ts){const d=new Date(ts),now=new Date(),m=Math.floor((now-d)/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';const dy=Math.floor(h/24);if(dy<7)return dy+'d ago';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function mName(id){const m=allMembers.find(x=>x.id===id);return m?(m.display_name||m.name):'';}
function preview(text){if(text.length<=PREVIEW_LEN)return esc(text);return esc(text.slice(0,PREVIEW_LEN))+'<span style="color:var(--text-muted)">…</span>';}

/* ── Boot ── */
async function boot() {
  entries    = tryParse(JKEY, []);
  locations  = tryParse(LKEY, []);
  hsNotes    = tryParse(HKEY, []);
  roles      = tryParse(RKEY, []);
  customTags = tryParse(TKEY, DEFAULT_TAGS);
  renderComposeTags();
  renderEntries(); renderLocations(); renderHsNotes(); renderRoles();
  try {
    const [sys, fronters, members] = await Promise.all([
      fetch(API+'/systems/@me',          {headers:{Authorization:TOKEN}}).then(r=>r.ok?r.json():null),
      fetch(API+'/systems/@me/fronters',  {headers:{Authorization:TOKEN}}).then(r=>r.ok?r.json():null),
      fetch(API+'/systems/@me/members',   {headers:{Authorization:TOKEN}}).then(r=>r.ok?r.json():[])
    ]);
    if (sys)      renderSysCard(sys);
    if (fronters) renderFronterCard(fronters.members||[]);
    allMembers = (members||[]).sort((a,b)=>(a.display_name||a.name||'').localeCompare(b.display_name||b.name||''));
    buildAuthorList('compose');
    renderEntries(); renderLocations(); renderHsNotes(); renderRoles();
  } catch(e){ console.warn(e); }
}

/* ── System / fronter cards ── */
function renderSysCard(s) {
  const c=document.getElementById('system-card');
  if(s.banner){c.style.setProperty('--banner-url',`url('${s.banner}')`);c.classList.add('has-banner');}
  if(s.color) c.style.setProperty('--color-tint',`#${s.color}`);
  const av=s.avatar_url?`<img class="avatar" src="${s.avatar_url}" alt="">`:`<div class="avatar-initials">${esc((s.name||'S').charAt(0))}</div>`;
  c.innerHTML=`<div class="info-card-label">System</div>${av}<div class="info-text"><div class="info-name-row"><div class="info-name">${esc(s.name||'Unnamed System')}</div>${s.pronouns?`<div class="info-pronouns">${esc(s.pronouns)}</div>`:''}</div><div class="info-id">${esc(s.id||'')}</div></div>`;
}
function renderFronterCard(members) {
  const c=document.getElementById('fronter-card');
  if(!members.length){c.innerHTML=`<div class="info-card-label">Currently Fronting</div><div class="avatar-initials" style="opacity:.3">?</div><div class="info-text"><div class="info-name" style="color:var(--text-muted)">Nobody logged</div></div>`;return;}
  const m=members[0];
  if(m.banner){c.style.setProperty('--banner-url',`url('${m.banner}')`);c.classList.add('has-banner');}
  if(m.color) c.style.setProperty('--color-tint',`#${m.color}`);
  const bg = m.color ? `#${m.color}` : '#6b6f76';
  const avWrap = `width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;font-size:21px;font-weight:700;background:${bg};`;
  const av = m.avatar_url
    ? `<div style="${avWrap}"><img src="${m.avatar_url}" alt="" style="width:100%;height:100%;object-fit:cover;"></div>`
    : `<div style="${avWrap}">${esc((m.display_name||m.name||'?').charAt(0))}</div>`;
  c.innerHTML=`<div class="info-card-label">Currently Fronting</div>${av}<div class="info-text"><div class="info-name-row"><div class="info-name">${esc(m.display_name||m.name||'Unknown')}</div>${m.pronouns?`<div class="info-pronouns">${esc(m.pronouns)}</div>`:''}</div><div class="info-id">${esc(m.id||'')}</div></div>`;
}

/* ── Tab switching ── */
function switchSubTab(tab,el){
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sub-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sub-'+tab).classList.add('active');
}
function switchHsTab(tab,el){
  document.querySelectorAll('.hs-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.hs-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('hs-panel-'+tab).classList.add('active');
}

/* ── Author picker ── */
function buildAuthorList(ctx, filterQ='') {
  const list=document.getElementById(`${ctx}-author-list`);
  list.innerHTML='';
  const q=filterQ.toLowerCase();
  const curId=ctx==='compose'?composeAuthorId:editAuthorId;

  const noneItem=document.createElement('div');
  noneItem.className='author-dropdown-item none-item'+(curId===null?' selected':'');
  noneItem.innerHTML=`<span class="adi-av" style="opacity:.4">—</span><span class="adi-name">No author</span>${curId===null?'<svg class="adi-check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}`;
  noneItem.onclick=()=>selectAuthor(ctx,null);
  list.appendChild(noneItem);

  allMembers.filter(m=>!q||(m.display_name||m.name||'').toLowerCase().includes(q)).forEach(m=>{
    const nm=m.display_name||m.name||'?';
    const bg=m.color?`background:#${m.color}44;`:'';
    const avInner=m.avatar_url?`<img src="${m.avatar_url}" alt="">`:`<span style="font-size:9px;font-weight:700">${esc(nm.charAt(0))}</span>`;
    const isSel=curId===m.id;
    const item=document.createElement('div');
    item.className='author-dropdown-item'+(isSel?' selected':'');
    item.innerHTML=`<span class="adi-av" style="${bg}">${avInner}</span><span class="adi-name">${esc(nm)}</span>${isSel?'<svg class="adi-check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}`;
    item.onclick=()=>selectAuthor(ctx,m.id);
    list.appendChild(item);
  });
}
function filterAuthorList(ctx,q){buildAuthorList(ctx,q);}
function selectAuthor(ctx,id){
  if(ctx==='compose')composeAuthorId=id; else editAuthorId=id;
  updateAuthorBtn(ctx,id);
  closeAuthorDropdown(ctx);
}
function updateAuthorBtn(ctx,id){
  const m=id?allMembers.find(x=>x.id===id):null;
  const nm=m?(m.display_name||m.name||'?'):(ctx==='compose'?"Who's writing? (optional)":'System (no author)');
  const bg=m?.color?`background:#${m.color}44;`:'';
  const avInner=m?(m.avatar_url?`<img src="${m.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`:`<span style="font-size:9px;font-weight:700">${esc(nm.charAt(0))}</span>`):(ctx==='compose'?'?':'—');
  document.getElementById(`${ctx}-apb-av`).innerHTML=avInner;
  document.getElementById(`${ctx}-apb-av`).style.cssText=bg;
  document.getElementById(`${ctx}-apb-name`).textContent=nm;
  if(ctx==='compose'){
    const el=document.getElementById('compose-avatar-el');
    if(m){el.innerHTML=m.avatar_url?`<img src="${m.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`:esc(nm.charAt(0));el.style.background=m.color?`#${m.color}44`:'';} else{el.innerHTML='?';el.style.background='';}
  }
}
function toggleAuthorDropdown(ctx){
  const btn=document.getElementById(`${ctx}-author-btn`);
  const dd=document.getElementById(`${ctx}-author-dropdown`);
  const isOpen=dd.classList.contains('open');
  document.querySelectorAll('.author-dropdown').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.author-picker-btn').forEach(b=>b.classList.remove('open'));
  if(!isOpen){
    dd.classList.add('open');btn.classList.add('open');
    buildAuthorList(ctx);
    const inp=dd.querySelector('.author-dropdown-search');inp.value='';inp.focus();
  }
}
function closeAuthorDropdown(ctx){
  document.getElementById(`${ctx}-author-dropdown`).classList.remove('open');
  document.getElementById(`${ctx}-author-btn`).classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.author-picker-wrap')){
    document.querySelectorAll('.author-dropdown').forEach(d=>d.classList.remove('open'));
    document.querySelectorAll('.author-picker-btn').forEach(b=>b.classList.remove('open'));
  }
});

/* ── Tags ── */
function renderComposeTags(){
  const row=document.getElementById('compose-tag-row');row.innerHTML='';
  customTags.forEach(t=>{const b=document.createElement('button');b.className='compose-tag';b.dataset.tag=t.id;b.textContent=t.label;b.addEventListener('click',()=>b.classList.toggle('active'));row.appendChild(b);});
}
function renderEditTags(activeTags=[]){
  const row=document.getElementById('edit-tag-row');row.innerHTML='';
  customTags.forEach(t=>{const b=document.createElement('button');b.className='edit-tag'+(activeTags.includes(t.id)?' active':'');b.dataset.tag=t.id;b.textContent=t.label;b.addEventListener('click',()=>b.classList.toggle('active'));row.appendChild(b);});
}

/* ── Tag manager ── */
function openTagManager(){
  renderTagMgrList();renderTagColorSwatches();
  document.getElementById('tag-add-input').value='';
  openModal('tag-mgr-modal');
}
function renderTagMgrList(){
  const list=document.getElementById('tag-mgr-list');list.innerHTML='';
  customTags.forEach(t=>{
    const item=document.createElement('div');item.className='tag-mgr-item';
    item.innerHTML=`<div class="tag-mgr-swatch" style="background:${t.color}"></div><div class="tag-mgr-name">${esc(t.label)}</div><button class="tag-mgr-del" onclick="deleteTag('${t.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    list.appendChild(item);
  });
}
function renderTagColorSwatches(){
  const row=document.getElementById('tag-color-swatches');row.innerHTML='';
  PALETTE.forEach(c=>{const d=document.createElement('div');d.className='tag-color-dot'+(c===tagMgrColor?' selected':'');d.style.background=c;d.onclick=()=>{tagMgrColor=c;row.querySelectorAll('.tag-color-dot').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');};row.appendChild(d);});
}
function addCustomTag(){
  const inp=document.getElementById('tag-add-input');const label=inp.value.trim();if(!label){inp.focus();return;}
  customTags.push({id:'tag_'+Date.now(),label,color:tagMgrColor});saveTags();inp.value='';renderTagMgrList();renderComposeTags();
}
function deleteTag(id){customTags=customTags.filter(t=>t.id!==id);saveTags();renderTagMgrList();renderComposeTags();}

/* ── Journal entries ── */
function postEntry(){
  const text=document.getElementById('compose-text').value.trim();if(!text)return;
  const tags=[...document.querySelectorAll('#compose-tag-row .compose-tag.active')].map(b=>b.dataset.tag);
  entries.unshift({id:'e_'+Date.now(),authorId:composeAuthorId,text,tags,ts:Date.now()});
  saveJ();
  document.getElementById('compose-text').value='';
  document.querySelectorAll('#compose-tag-row .compose-tag').forEach(b=>b.classList.remove('active'));
  currentPage=1;renderEntries();
}
function setFilter(f,el){document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');currentPage=1;renderEntries();}
function filterEntries(){searchQ=document.getElementById('journal-search').value.toLowerCase();currentPage=1;renderEntries();}

function renderEntries(){
  document.getElementById('entry-count').textContent=entries.length;
  filteredEntries=entries.filter(e=>{
    if(searchQ&&!e.text.toLowerCase().includes(searchQ)&&!e.tags.some(t=>t.includes(searchQ))&&!mName(e.authorId).toLowerCase().includes(searchQ))return false;
    return true;
  });
  const list=document.getElementById('entries-list');
  const pag=document.getElementById('pagination');
  if(!filteredEntries.length){
    list.innerHTML=`<div class="empty-state" style="padding:44px 16px;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 12px;"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><div>${entries.length?'No matching entries.':'No entries yet.'}</div>${!entries.length?'<p>Write the first one on the left!</p>':''}</div>`;
    pag.style.display='none';return;
  }
  const totalPages=Math.ceil(filteredEntries.length/PER_PAGE);
  if(currentPage>totalPages)currentPage=totalPages;
  const start=(currentPage-1)*PER_PAGE;
  const pageEntries=filteredEntries.slice(start,start+PER_PAGE);
  list.innerHTML='';
  pageEntries.forEach((e,i)=>{
    const m=allMembers.find(x=>x.id===e.authorId);
    const nm=m?(m.display_name||m.name):'System';
    const bg=m?.color?`background:#${m.color}44;`:'';
    const av=m?.avatar_url?`<div class="entry-avatar"><img src="${m.avatar_url}" alt=""></div>`:`<div class="entry-avatar" style="${bg}">${esc(nm.charAt(0))}</div>`;
    const tagHTML=e.tags.map(tid=>{const tdef=customTags.find(t=>t.id===tid);const label=tdef?tdef.label:tid;const color=tdef?tdef.color:'#80848e';return`<span class="entry-tag" style="background:${color}22;color:${color};border-color:${color}55">${esc(label)}</span>`;}).join('');
    const el=document.createElement('div');el.className='entry';el.style.animationDelay=`${i*0.05}s`;
    el.innerHTML=`
      <div class="entry-header" style="cursor:pointer;" onclick="toggleEntry(this.parentElement)">
        ${av}
        <div class="entry-meta"><span class="entry-author">${esc(nm)}</span><span class="entry-time">${relTime(e.ts)}</span></div>
        <div class="entry-tags">${tagHTML}</div>
        <span class="entry-chevron"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      </div>
      <div class="entry-body" onclick="toggleEntry(this.parentElement)">${preview(e.text)}</div>
      <div class="entry-full" style="display:none;font-size:13px;line-height:1.65;color:var(--text-secondary);white-space:pre-wrap;word-break:break-word;">${esc(e.text)}</div>
      <div class="entry-actions">
        <button class="entry-action-btn" onclick="openEditEntry('${e.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>
        <button class="entry-action-btn danger" onclick="delEntry('${e.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg> Delete</button>
      </div>`;
    list.appendChild(el);
  });
  if(totalPages<=1){pag.style.display='none';return;}
  pag.style.display='flex';pag.innerHTML='';
  const prevBtn=document.createElement('button');prevBtn.className='page-btn';prevBtn.disabled=currentPage===1;prevBtn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;prevBtn.onclick=()=>{if(currentPage>1){currentPage--;renderEntries();}};pag.appendChild(prevBtn);
  const info=document.createElement('span');info.className='page-info';info.textContent=`${currentPage} / ${totalPages}`;pag.appendChild(info);
  const nextBtn=document.createElement('button');nextBtn.className='page-btn';nextBtn.disabled=currentPage===totalPages;nextBtn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;nextBtn.onclick=()=>{if(currentPage<totalPages){currentPage++;renderEntries();}};pag.appendChild(nextBtn);
}

function toggleEntry(el){
  const isExp=el.classList.toggle('expanded');
  el.querySelector('.entry-body').style.display=isExp?'none':'';
  el.querySelector('.entry-full').style.display=isExp?'':'none';
}
function delEntry(id){entries=entries.filter(e=>e.id!==id);saveJ();if(currentPage>Math.ceil((filteredEntries.length-1)/PER_PAGE)&&currentPage>1)currentPage--;renderEntries();}

function openEditEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editingEntryId=id;
  editAuthorId=e.authorId||null;
  updateAuthorBtn('edit',editAuthorId);
  buildAuthorList('edit');
  document.getElementById('edit-entry-text').value=e.text;
  renderEditTags(e.tags);
  openModal('edit-entry-modal');
  setTimeout(()=>document.getElementById('edit-entry-text').focus(),50);
}
function saveEditEntry(){
  const e=entries.find(x=>x.id===editingEntryId);if(!e)return;
  const text=document.getElementById('edit-entry-text').value.trim();if(!text){document.getElementById('edit-entry-text').focus();return;}
  e.text=text;e.authorId=editAuthorId;
  e.tags=[...document.querySelectorAll('#edit-tag-row .edit-tag.active')].map(b=>b.dataset.tag);
  saveJ();closeModal('edit-entry-modal');renderEntries();
}

/* ── Locations ── */

  list.innerHTML='';
  locations.forEach((loc,i)=>{
    const iconDef=LOC_ICONS_SVG.find(x=>x.id===loc.icon)||LOC_ICONS_SVG[0];
    const pips=loc.memberIds.slice(0,4).map(mid=>{const m=allMembers.find(x=>x.id===mid);if(!m)return'';const bg=m.color?`background:#${m.color}44;`:'';return m.avatar_url?`<div class="loc-pip"><img src="${m.avatar_url}" alt=""></div>`:`<div class="loc-pip" style="${bg}">${esc((m.display_name||m.name||'?').charAt(0))}</div>`;}).join('');

    const card=document.createElement('div');card.className='location-card';card.style.animationDelay=`${i*0.04}s`;
    card.innerHTML=`<div class="location-main" onclick="this.parentElement.classList.toggle('expanded')"><div class="location-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${iconDef.svg}</svg></div><div class="location-info"><div class="location-name">${esc(loc.name)}</div><div class="location-desc-short">${esc(loc.desc||'No description')}</div></div><div class="loc-pips">${pips}${extra}</div><button class="icon-btn" onclick="event.stopPropagation();openLocModal('${loc.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div><div class="location-expand"><div class="loc-expand-body">${esc(loc.desc||'No description added yet.')}</div>${loc.memberIds.length?`<div class="loc-expand-members">${expandMembers}</div>`:''}</div>`;
    list.appendChild(card);
  });
}
function openLocModal(locId){
  editLocId=locId||null;const isEdit=!!locId;const loc=isEdit?locations.find(l=>l.id===locId):null;
  document.getElementById('loc-modal-title').textContent=isEdit?'Edit Location':'Add Location';
  document.getElementById('loc-name').value=isEdit?loc.name:'';
  document.getElementById('loc-desc').value=isEdit?(loc.desc||''):'';
  document.getElementById('loc-del-btn').style.display=isEdit?'':'none';
  const ir=document.getElementById('loc-icon-row');ir.innerHTML='';
  const selIcon=loc?.icon||LOC_ICONS_SVG[0].id;
  LOC_ICONS_SVG.forEach(iconDef=>{const b=document.createElement('button');b.type='button';b.className='loc-icon-btn'+(iconDef.id===selIcon?' selected':'');b.title=iconDef.id;b.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${iconDef.svg}</svg>`;b.dataset.icon=iconDef.id;b.onclick=()=>{ir.querySelectorAll('.loc-icon-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');};ir.appendChild(b);});
  buildMemberList('loc-members',loc?.memberIds||[]);
  openModal('loc-modal');
}
function saveLoc(){
  const name=document.getElementById('loc-name').value.trim();if(!name){document.getElementById('loc-name').focus();return;}
  const icon=document.querySelector('#loc-icon-row .loc-icon-btn.selected')?.dataset.icon||LOC_ICONS_SVG[0].id;
  const desc=document.getElementById('loc-desc').value.trim();
  const memberIds=getChecked('loc-members');
  if(editLocId){const l=locations.find(x=>x.id===editLocId);if(l)Object.assign(l,{name,icon,desc,memberIds});}
  else locations.push({id:'l_'+Date.now(),name,icon,desc,memberIds});
  saveL();closeModal('loc-modal');renderLocations();
}
function deleteLoc(){locations=locations.filter(l=>l.id!==editLocId);saveL();closeModal('loc-modal');renderLocations();}

/* ── Modal helpers ── */
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function bgClose(e,id){if(e.target===document.getElementById(id))closeModal(id);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')['edit-entry-modal','tag-mgr-modal','loc-modal','hs-modal','role-modal'].forEach(closeModal);});

function buildMemberList(listId,selectedIds){
  const list=document.getElementById(listId);list.innerHTML='';
  if(!allMembers.length){list.innerHTML='<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">Loading members…</div>';return;}
  allMembers.forEach(m=>{
    const checked=selectedIds.includes(m.id);
    const item=document.createElement('div');item.className='modal-member-item'+(checked?' checked':'');item.dataset.id=m.id;
    const chk=document.createElement('div');chk.className='mmi-check';
    const av=document.createElement('div');av.className='mmi-av';
    if(m.avatar_url)av.innerHTML=`<img src="${m.avatar_url}" alt="">`;
    else{av.textContent=(m.display_name||m.name||'?').charAt(0);if(m.color)av.style.background=`#${m.color}44`;}
    const nm=document.createElement('div');nm.className='mmi-name';nm.textContent=m.display_name||m.name;
    item.appendChild(chk);item.appendChild(av);item.appendChild(nm);
    item.onclick=()=>item.classList.toggle('checked');
    list.appendChild(item);
  });
}
function getChecked(listId){return[...document.querySelectorAll(`#${listId} .modal-member-item.checked`)].map(el=>el.dataset.id);}
function buildColorRow(rowId,sel){
  const row=document.getElementById(rowId);row.innerHTML='';
  PALETTE.forEach(c=>{const sw=document.createElement('div');sw.className='modal-color-swatch'+(c===sel?' selected':'');sw.style.background=c;sw.dataset.color=c;sw.onclick=()=>{row.querySelectorAll('.modal-color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');};row.appendChild(sw);});
}

function logout(){sessionStorage.removeItem('pk_token');window.location.href='index.html';}

boot();
