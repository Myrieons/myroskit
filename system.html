<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYROSKIT — System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0d0d0f;
    --bg-secondary: rgba(28, 29, 32, 0.65);
    --bg-tertiary: rgba(33, 34, 38, 0.6);
    --bg-hover: rgba(38, 39, 44, 0.75);
    --accent: #6b6f76;
    --accent-hover: #55585e;
    --accent-rgb: 107, 111, 118;
    --green: #23a559;
    --text-primary: #f2f3f5;
    --text-secondary: #b5bac1;
    --text-muted: #80848e;
    --border: rgba(255, 255, 255, 0.08);
    --border-subtle: rgba(255, 255, 255, 0.04);
    --radius: 12px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* ── Topline ── */
  .topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .wordmark { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .wordmark .myros { color: var(--text-primary); }
  .wordmark .kit   { color: var(--accent); }

  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
  }
  .btn-logout:hover { color: var(--text-primary); border-color: var(--text-muted); }

  /* ── Info cards row ── */
  .info-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .info-card {
    position: relative;
    background: var(--bg-secondary);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
    overflow: hidden;
    isolation: isolate;
  }

  .info-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: var(--banner-url, none);
    background-size: cover;
    background-position: center;
    filter: blur(8px) brightness(0.35);
    transform: scale(1.08);
    z-index: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .info-card.has-banner::before { opacity: 1; }

  .info-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--color-tint, transparent);
    opacity: 0.18;
    z-index: 0;
    pointer-events: none;
  }

  .info-card > * { position: relative; z-index: 1; }

  .info-card-label {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  .info-text { min-width: 0; flex: 1; }

  .info-name-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    min-width: 0;
  }

  .info-name {
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .info-pronouns {
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.45;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .info-id {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Courier New', monospace;
    margin-top: 3px;
  }

  /* ── Nav tabs ── */
  .nav-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .nav-tab {
    background: rgba(49, 51, 56, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    flex: 1;
    text-align: center;
    white-space: nowrap;
    text-decoration: none;
    display: block;
  }

  .nav-tab.active {
    background: #1e1f22;
    border-color: rgba(255,255,255,0.14);
    color: var(--text-primary);
  }

  /* ── Content box ── */
  .content-box {
    background: var(--bg-secondary);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .content-box + .content-box { margin-top: 12px; }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
  }

  /* ── Fields grid ── */
  .fields-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 16px;
  }

  .field { min-width: 0; }

  .field-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .field-value {
    font-size: 13px;
    color: var(--text-secondary);
    word-break: break-word;
    line-height: 1.4;
  }

  .field-value.mono {
    font-family: 'Courier New', monospace;
    font-size: 12px;
  }

  .color-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    vertical-align: middle;
    margin-right: 5px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* ── Description ── */
  .desc-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .desc-view {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
    word-break: break-word;
  }

  .desc-view p { margin-bottom: 6px; }
  .desc-view p:last-child { margin-bottom: 0; }
  .desc-view strong { color: var(--text-primary); font-weight: 700; }
  .desc-view em { font-style: italic; }
  .desc-view s { opacity: 0.5; }
  .desc-view a { color: var(--accent); text-decoration: none; }
  .desc-view a:hover { text-decoration: underline; }
  .desc-view ul, .desc-view ol { padding-left: 18px; margin-bottom: 6px; }
  .desc-view li { margin-bottom: 2px; }
  .desc-view h1, .desc-view h2, .desc-view h3 {
    color: var(--text-primary);
    font-weight: 700;
    margin-bottom: 4px;
    margin-top: 8px;
  }
  .desc-view h1 { font-size: 16px; }
  .desc-view h2 { font-size: 14px; }
  .desc-view h3 { font-size: 13px; }
  .desc-view blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 10px;
    margin: 6px 0;
    color: var(--text-muted);
    font-style: italic;
  }
  .desc-view code {
    background: rgba(13,13,15,0.6);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #e8c07a;
  }
  .desc-view pre {
    background: rgba(13,13,15,0.6);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .desc-view pre code { background: none; border: none; padding: 0; }

  .desc-empty {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Edit form ── */
  .edit-form { display: none; }
  .edit-form.visible { display: block; }
  .view-content.hidden { display: none; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px 16px;
    margin-bottom: 16px;
  }

  .form-field { min-width: 0; }

  .form-label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: rgba(13, 13, 15, 0.5);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: rgba(var(--accent-rgb), 0.5); }
  .form-input::placeholder { color: var(--text-muted); }

  .form-input.mono { font-family: 'Courier New', monospace; font-size: 12px; }

  .form-textarea {
    width: 100%;
    background: rgba(13, 13, 15, 0.5);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    resize: vertical;
    min-height: 100px;
    line-height: 1.55;
    transition: border-color 0.15s;
  }

  .form-textarea:focus { border-color: rgba(var(--accent-rgb), 0.5); }
  .form-textarea::placeholder { color: var(--text-muted); }

  /* Color picker row */
  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-picker-wrap {
    position: relative;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  .color-swatch {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }

  .color-swatch:hover { border-color: var(--text-muted); transform: scale(1.1); }

  .color-native {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    border: none;
    padding: 0;
  }

  .color-hex {
    flex: 1;
    background: rgba(13, 13, 15, 0.5);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .color-hex:focus { border-color: rgba(var(--accent-rgb), 0.5); }

  .color-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
    white-space: nowrap;
  }

  .color-clear:hover { color: var(--text-primary); border-color: var(--text-muted); }


  /* ── ImgBB upload button ── */
  .upload-btn {
    background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-muted);
    font-family: inherit; font-size: 11px; font-weight: 600;
    padding: 0 8px; cursor: pointer; height: 100%;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
    display: none; align-items: center; gap: 4px; white-space: nowrap;
    flex-shrink: 0;
  }
  .upload-btn.imgbb-ready { display: inline-flex; }
  .upload-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }
  .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-btn.uploading { opacity: 0.6; cursor: not-allowed; }

  /* ── Image preview ── */
  .media-preview-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }

  .img-preview {
    width: 36px;
    height: 36px;
    object-fit: cover;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    display: none;
  }

  .img-preview.avatar-preview { border-radius: 50%; }
  .img-preview.banner-preview { border-radius: 4px; width: 64px; }
  .img-preview.visible { display: block; }

  /* ── Edit actions ── */
  .edit-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid var(--border-subtle);
    margin-top: 4px;
  }

  .save-status {
    font-size: 12px;
    color: var(--green);
    margin-right: auto;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .save-status.visible { opacity: 1; }

  .btn {
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.1s;
    border: 1px solid transparent;
  }

  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: none;
    color: var(--text-muted);
    border-color: var(--border);
  }
  .btn-secondary:hover { color: var(--text-primary); border-color: var(--text-muted); }

  .btn-edit {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
  }

  .btn-edit:hover { color: var(--text-primary); border-color: var(--text-muted); }
  .btn-edit.active { color: var(--accent); border-color: rgba(var(--accent-rgb), 0.4); }

  /* ── Skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
  * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }

  @media (max-width: 620px) {
    .info-row { grid-template-columns: 1fr; }
    .fields-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .nav-tabs { flex-wrap: wrap; }
    .nav-tab { flex: none; font-size: 12px; padding: 7px 12px; }
  }
  /* ── Multi-fronter carousel ── */
  .fronter-nav {
    position: absolute; bottom: 7px; z-index: 2;
    display: flex; align-items: center; gap: 4px;
  }
  .fronter-nav.prev { left: 8px; }
  .fronter-nav.next { right: 8px; }
  .fronter-arrow {
    background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
    color: var(--text-secondary); cursor: pointer;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, color 0.1s; font-size: 13px; flex-shrink: 0; padding: 0;
  }
  .fronter-arrow:hover { background: rgba(0,0,0,0.6); color: var(--text-primary); }
  .fronter-pip-wrap { display: flex; gap: 3px; align-items: center; }
  .fronter-pip {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.25); transition: background 0.15s;
  }
  .fronter-pip.active { background: rgba(255,255,255,0.8); }

</style>
</head>
<body>
<div class="page">

  <!-- Logo + logout -->
  <div class="topline">
    <div class="wordmark"><span class="myros">MYROS</span><span class="kit">KIT</span></div>
    <div style="display:flex;align-items:center;gap:6px;"><a class="btn-logout" href="https://github.com/Myrieons/MyrosKit" target="_blank" rel="noopener" title="View on GitHub" style="display:inline-flex;align-items:center;text-decoration:none;padding:5px 8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg></a><button class="btn-logout" onclick="logout()">Log out</button></div>
  </div>

  <!-- System + Fronter cards -->
  <div class="info-row">
    <div class="info-card" id="system-card">
      <div class="skeleton" style="width:56px;height:56px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div class="skeleton" style="height:15px;width:120px;margin-bottom:6px"></div>
        <div class="skeleton" style="height:11px;width:80px"></div>
      </div>
    </div>
    <div class="info-card" id="fronter-card">
      <div class="skeleton" style="width:56px;height:56px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div class="skeleton" style="height:10px;width:60px;margin-bottom:6px"></div>
        <div class="skeleton" style="height:15px;width:100px;margin-bottom:6px"></div>
        <div class="skeleton" style="height:11px;width:70px"></div>
      </div>
    </div>
  </div>

  <!-- Nav tabs -->
  <div class="nav-tabs">
    <a class="nav-tab" href="dashboard.html">Members</a>
    <a class="nav-tab active" href="system.html">System</a>
    <a class="nav-tab" href="switches.html">Switch History</a>
    <a class="nav-tab" href="groups.html">Group List</a>
    <a class="nav-tab" href="analytics.html">Analytics</a>
    <a class="nav-tab" href="settings.html">Settings</a>
  </div>

  <!-- Info + edit -->
  <div class="content-box">
    <div class="section-header">
      <div class="section-title">System Info</div>
      <button class="btn-edit" id="edit-toggle-btn" onclick="toggleEdit()">Edit</button>
    </div>

    <!-- View mode -->
    <div id="view-content">
      <div class="fields-grid" id="fields-grid">
        <!-- Populated by JS -->
        <div class="field"><div class="field-label">Name</div><div class="skeleton" style="height:13px;width:80px"></div></div>
        <div class="field"><div class="field-label">Tag</div><div class="skeleton" style="height:13px;width:60px"></div></div>
        <div class="field"><div class="field-label">Pronouns</div><div class="skeleton" style="height:13px;width:70px"></div></div>
        <div class="field"><div class="field-label">Color</div><div class="skeleton" style="height:13px;width:60px"></div></div>
        <div class="field"><div class="field-label">ID</div><div class="skeleton" style="height:13px;width:55px"></div></div>
        <div class="field"><div class="field-label">Created</div><div class="skeleton" style="height:13px;width:90px"></div></div>
      </div>
      <div class="desc-label">Description</div>
      <div id="desc-view" class="desc-view desc-empty">No description set.</div>
    </div>

    <!-- Edit mode -->
    <div class="edit-form" id="edit-form">
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">Name</label>
          <input class="form-input" id="f-name" type="text" placeholder="System name" />
        </div>
        <div class="form-field">
          <label class="form-label">Tag</label>
          <input class="form-input" id="f-tag" type="text" placeholder="e.g. | System" />
        </div>
        <div class="form-field">

              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload

            </button>

        <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>

</div>

<script>
const API   = 'https://api.pluralkit.me/v2';

// ── ImgBB upload utility ──────────────────────────────────
const IMGBB_KEY = 'imgbb_api_key';

function getImgbbKey() { return localStorage.getItem(IMGBB_KEY) || ''; }

async function imgbbUpload(file, onDone, onError, btn) {
  const key = getImgbbKey();
  if (!key) { onError('No ImgBB API key set. Add one in Settings.'); return; }

  btn.classList.add('uploading');
  btn.disabled = true;
  const origHTML = btn.innerHTML;
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>';

  try {
    const reader = new FileReader();
    const b64 = await new Promise((res, rej) => {
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });

    const form = new FormData();
    form.append('key', key);
    form.append('image', b64);
    form.append('name', file.name.replace(/\.[^.]+$/, ''));

    const r = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
    const data = await r.json();

    if (data.success) {
      onDone(data.data.url);
    } else {
      onError(data.error?.message || 'Upload failed.');
    }
  } catch(e) {
    onError('Upload failed — check your connection.');
  }

  btn.classList.remove('uploading');
  btn.disabled = false;
  btn.innerHTML = origHTML;
}

function makeUploadBtn(inp, previewEl, isRound) {
  const key = getImgbbKey();
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);

  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'upload-btn' + (key ? ' imgbb-ready' : '');
  btn.title = key ? 'Upload image' : 'Add an ImgBB API key in Settings to upload images';
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload';

  btn.onclick = () => { if (getImgbbKey()) fileInput.click(); };

  fileInput.onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;
    imgbbUpload(file,
      url => {
        inp.value = url;
        inp.dispatchEvent(new Event('input'));
        if (previewEl) {
          previewEl.src = url;
          previewEl.classList.add('visible');
          if (isRound) previewEl.style.borderRadius = '50%';
        }
      },
      err => alert('Upload error: ' + err),
      btn
    );
    fileInput.value = '';
  };

  return btn;
}

// ── Apply saved accent color ───────────────────────────────
const token = sessionStorage.getItem('pk_token');
if (!token) window.location.href = 'index.html';

const COLORS = ['#e8457a','#eb459e','#57f287','#fee75c','#ed4245','#1b9adf','#f47fff','#ff944d'];
function randColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }
function initial(name) { return name ? name.charAt(0).toUpperCase() : '?'; }

let systemData = null;

// ── Markdown ────────────────────────────────────────────
function renderMarkdown(text) {
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/```([a-z]*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
  s = s.replace(/~~~([a-z]*)\n?([\s\S]*?)~~~/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/_(.+?)_/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g, '<s>$1</s>');
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  s = s.replace(/(^[-*] .+(\n|$))+/gm, match => {
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^[-*] /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  s = s.replace(/(^\d+\. .+(\n|$))+/gm, match => {
    const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.split(/\n{2,}/).map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-3]|ul|ol|pre|blockquote)/.test(block)) return block;
    return `<p>${block.replace(/\n/g, '<br>')}</p>`;
  }).join('');
  return s;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Color picker sync ───────────────────────────────────
document.getElementById('color-native').addEventListener('input', e => {
  syncColor(e.target.value);
});

document.getElementById('color-hex').addEventListener('input', e => {
  syncColor(e.target.value);
});

function syncColor(hex) {
  const clean = hex.replace('#','');
  const valid = /^[0-9a-fA-F]{6}$/.test(clean);
  document.getElementById('color-swatch').style.background = valid ? `#${clean}` : '#888';
  if (valid) document.getElementById('color-native').value = `#${clean}`;
  document.getElementById('color-hex').value = hex.startsWith('#') ? hex : (hex ? '#' + hex : '');
}

function clearColor() {
  document.getElementById('color-hex').value = '';
  document.getElementById('color-swatch').style.background = '#888';
}

// ── Image preview ───────────────────────────────────────
function previewImg(inputId, previewId) {
  const url = document.getElementById(inputId).value.trim();
  const img = document.getElementById(previewId);
  if (url) { img.src = url; img.classList.add('visible'); }
  else img.classList.remove('visible');
}

// ── ImgBB upload trigger (for static form inputs) ────────
const _sysFileInput = document.createElement('input');
_sysFileInput.type = 'file'; _sysFileInput.accept = 'image/*'; _sysFileInput.style.display = 'none';
document.body.appendChild(_sysFileInput);
let _sysUploadTarget = null;

function triggerUpload(inputId, previewId, isRound) {
  if (!getImgbbKey()) { alert('Add an ImgBB API key in Settings to upload images.'); return; }
  _sysUploadTarget = { inputId, previewId, isRound };
  _sysFileInput.value = '';
  _sysFileInput.click();
}

_sysFileInput.onchange = () => {
  const file = _sysFileInput.files[0];
  if (!file || !_sysUploadTarget) return;
  const { inputId, previewId, isRound } = _sysUploadTarget;
  const inp = document.getElementById(inputId);
  const prev = document.getElementById(previewId);
  const btn = document.getElementById('upload-' + inputId.replace('f-','') + '-btn');
  imgbbUpload(file, url => {
    inp.value = url;
    inp.dispatchEvent(new Event('input'));
    if (prev) { prev.src = url; prev.classList.add('visible'); if (isRound) prev.style.borderRadius = '50%'; }
  }, err => alert('Upload error: ' + err), btn || { classList: { add: ()=>{}, remove: ()=>{} }, disabled: false, innerHTML: '' });
};

// ── Info fields rendering ────────────────────────────────
function renderView(sys) {
  const created = sys.created
    ? new Date(sys.created).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })
    : '—';

  const fields = [
    { label: 'Name',     val: sys.name || '—' },
    { label: 'Tag',      val: sys.tag || '—' },
    { label: 'Pronouns', val: sys.pronouns || '—' },
    { label: 'Color',    val: sys.color ? `<span class="color-dot" style="background:#${sys.color}"></span>#${sys.color}` : '—', html: true },
    { label: 'ID',       val: sys.id, mono: true },
    { label: 'Created',  val: created },
  ];

  const grid = document.getElementById('fields-grid');
  grid.innerHTML = fields.map(f => `
    <div class="field">
      <div class="field-label">${f.label}</div>
      <div class="field-value${f.mono ? ' mono' : ''}">${f.html ? f.val : esc(f.val)}</div>
    </div>
  `).join('');

  const descEl = document.getElementById('desc-view');
  if (sys.description) {
    descEl.className = 'desc-view';
    descEl.innerHTML = renderMarkdown(sys.description);
  } else {
    descEl.className = 'desc-view desc-empty';
    descEl.textContent = 'No description set.';
  }
}

// ── Edit mode ────────────────────────────────────────────
let editing = false;

function toggleEdit() {
  editing ? cancelEdit() : enterEdit();
}

function enterEdit() {
  editing = true;
  const sys = systemData;
  document.getElementById('edit-toggle-btn').textContent = '✕ Cancel';
  document.getElementById('edit-toggle-btn').classList.add('active');
  document.getElementById('view-content').classList.add('hidden');
  document.getElementById('edit-form').classList.add('visible');

  // Show upload buttons if ImgBB key is set
  const hasKey = !!getImgbbKey();
  ['upload-avatar-btn','upload-banner-btn'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.classList.toggle('imgbb-ready', hasKey);
  });

  // Populate fields
  document.getElementById('f-name').value        = sys.name || '';
  document.getElementById('f-tag').value         = sys.tag || '';
  document.getElementById('f-pronouns').value    = sys.pronouns || '';
  document.getElementById('f-description').value = sys.description || '';
  document.getElementById('f-avatar').value      = sys.avatar_url || '';
  document.getElementById('f-banner').value      = sys.banner || '';

  // Avatar preview
  const avPrev = document.getElementById('avatar-preview');
  if (sys.avatar_url) { avPrev.src = sys.avatar_url; avPrev.classList.add('visible'); }
  else avPrev.classList.remove('visible');

  // Banner preview
  const bnPrev = document.getElementById('banner-preview');
  if (sys.banner) { bnPrev.src = sys.banner; bnPrev.classList.add('visible'); }
  else bnPrev.classList.remove('visible');

  // Color
  const hex = sys.color ? `#${sys.color}` : '';
  document.getElementById('color-hex').value = hex;
  document.getElementById('color-swatch').style.background = sys.color ? `#${sys.color}` : '#888';
  if (sys.color) document.getElementById('color-native').value = `#${sys.color}`;

  document.getElementById('save-status').classList.remove('visible');
}

function cancelEdit() {
  editing = false;
  document.getElementById('edit-toggle-btn').textContent = 'Edit';
  document.getElementById('edit-toggle-btn').classList.remove('active');
  document.getElementById('view-content').classList.remove('hidden');
  document.getElementById('edit-form').classList.remove('visible');
}

async function saveSystem() {
  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  const rawColor = document.getElementById('color-hex').value.replace('#','').trim();

  const patch = {
    name:        document.getElementById('f-name').value.trim() || null,
    tag:         document.getElementById('f-tag').value.trim() || null,
    pronouns:    document.getElementById('f-pronouns').value.trim() || null,
    description: document.getElementById('f-description').value.trim() || null,
    avatar_url:  document.getElementById('f-avatar').value.trim() || null,
    banner:      document.getElementById('f-banner').value.trim() || null,
    color:       /^[0-9a-fA-F]{6}$/.test(rawColor) ? rawColor : null,
  };

  try {
    const r = await fetch(`${API}/systems/@me`, {
      method: 'PATCH',
      headers: { Authorization: token, 'Content-Type': 'application/json' },
      body: JSON.stringify(patch)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const updated = await r.json();
    Object.assign(systemData, updated);

    // Sync cache
    const prev = _loadCache();
    if (prev) { prev.system = systemData; _saveCache(prev); }

    renderSystemCard(systemData);
    renderView(systemData);

    const status = document.getElementById('save-status');
    status.classList.add('visible');
    setTimeout(() => status.classList.remove('visible'), 2500);

    cancelEdit();
  } catch (err) {
    saveBtn.textContent = 'Error — retry';
    saveBtn.style.background = '#ed4245';
    saveBtn.style.borderColor = '#ed4245';
    setTimeout(() => {
      saveBtn.textContent = 'Save changes';
      saveBtn.style.background = '';
      saveBtn.style.borderColor = '';
      saveBtn.disabled = false;
    }, 2000);
    return;
  }

  saveBtn.textContent = 'Save changes';
  saveBtn.disabled = false;
}

// ── Shared info cards ───────────────────────────────────
function makeAvatar(url, name, size = 56) {
  const el = document.createElement('div');
  el.style.cssText = `width:${size}px;height:${size}px;font-size:${Math.round(size*0.38)}px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:${randColor()}`;
  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover';
    img.onerror = () => { img.remove(); el.textContent = initial(name); };
    el.appendChild(img);
  } else {
    el.textContent = initial(name);
  }
  return el;
}

function applyCardBanner(el, bannerUrl, color) {
  if (bannerUrl) {
    el.style.setProperty('--banner-url', `url('${bannerUrl}')`);
    el.classList.add('has-banner');
  }
  if (color) el.style.setProperty('--color-tint', `#${color}`);
}

function renderSystemCard(sys) {
  const card = document.getElementById('system-card');
  card.innerHTML = '<div class="info-card-label">System</div>';
  applyCardBanner(card, sys.banner, sys.color);
  card.appendChild(makeAvatar(sys.avatar_url, sys.name, 56));
  const text = document.createElement('div');
  text.className = 'info-text';
  text.innerHTML = `
    <div class="info-name-row">
      <div class="info-name">${esc(sys.name || 'Unnamed System')}</div>
      ${sys.pronouns ? `<div class="info-pronouns">${esc(sys.pronouns)}</div>` : ''}
    </div>
    <div class="info-id">${esc(sys.id || '')}</div>
  `;
  card.appendChild(text);
}


// ── Boot ─────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(API + path, { headers: { Authorization: token } });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}


function renderFronterCard(fronters) {
  const list = Array.isArray(fronters) ? fronters : (fronters ? [fronters] : []);
  const card = document.getElementById('fronter-card');
  let idx = 0;

  function _av(url, name, color) {
    const COLORS = ['#6b6f76','#eb459e','#57f287','#fee75c','#ed4245','#1b9adf','#f47fff','#ff944d'];
    function _rc(s) { let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xffffffff; return COLORS[Math.abs(h)%COLORS.length]; }
    const el = document.createElement('div');
    el.style.cssText = 'width:56px;height:56px;font-size:21px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:' + (color ? '#'+color : _rc(name||'?'));
    if (url) {
      const img = document.createElement('img');
      img.src = url; img.style.cssText = 'width:100%;height:100%;object-fit:cover';
      img.onerror = () => { img.remove(); el.textContent = (name||'?').charAt(0).toUpperCase(); };
      el.appendChild(img);
    } else { el.textContent = (name||'?').charAt(0).toUpperCase(); }
    return el;
  }

  function draw() {
    card.innerHTML = '<div class="info-card-label">Currently Fronting</div>';
    card.style.removeProperty('--banner-url');
    card.style.removeProperty('--color-tint');
    card.classList.remove('has-banner');

    if (!list.length) {
      const emptyAv = document.createElement('div');
      emptyAv.style.cssText = 'width:56px;height:56px;border-radius:50%;background:var(--bg-tertiary);border:1px dashed var(--border);flex-shrink:0';
      card.appendChild(emptyAv);
      const emptyText = document.createElement('div');
      emptyText.className = 'info-text';
      emptyText.innerHTML = '<div class="info-name" style="color:var(--text-muted);font-style:italic;font-weight:400">No fronter registered</div>';
      card.appendChild(emptyText);
      return;
    }

    const fronter = list[idx];
    applyCardBanner(card, fronter.banner, fronter.color);
    card.appendChild(_av(fronter.avatar_url, fronter.display_name || fronter.name, fronter.color));

    const text = document.createElement('div');
    text.className = 'info-text';
    text.innerHTML = `
      <div class="info-name-row">
        <div class="info-name">${esc(fronter.display_name || fronter.name)}</div>
        ${fronter.pronouns ? '<div class="info-pronouns">' + esc(fronter.pronouns) + '</div>' : ''}
      </div>
      <div class="info-id">${esc(fronter.id || '')}</div>
    `;
    card.appendChild(text);

    if (list.length > 1) {
      const prevNav = document.createElement('div');
      prevNav.className = 'fronter-nav prev';
      const prevBtn = document.createElement('button');
      prevBtn.className = 'fronter-arrow';
      prevBtn.innerHTML = '&#8249;';
      prevBtn.title = 'Previous fronter';
      prevBtn.onclick = e => { e.stopPropagation(); idx = (idx - 1 + list.length) % list.length; draw(); };
      prevNav.appendChild(prevBtn);
      card.appendChild(prevNav);

      const nextNav = document.createElement('div');
      nextNav.className = 'fronter-nav next';
      const pipWrap = document.createElement('div');
      pipWrap.className = 'fronter-pip-wrap';
      list.forEach((_, i) => {
        const pip = document.createElement('div');
        pip.className = 'fronter-pip' + (i === idx ? ' active' : '');
        pipWrap.appendChild(pip);
      });
      nextNav.appendChild(pipWrap);
      const nextBtn = document.createElement('button');
      nextBtn.className = 'fronter-arrow';
      nextBtn.innerHTML = '&#8250;';
      nextBtn.title = 'Next fronter';
      nextBtn.onclick = e => { e.stopPropagation(); idx = (idx + 1) % list.length; draw(); };
      nextNav.appendChild(nextBtn);
      card.appendChild(nextNav);
    }
  }

  draw();
}

async function boot() {
  // ── Render from cache immediately if available ──
  const cached = _loadCache();
  if (cached) {
    systemData = cached.system;
    renderSystemCard(systemData);
    renderFronterCard(cached.fronter);
    renderView(systemData);
  }

  // ── Always fetch fresh data in background ──
  try {
    const [system, switches] = await Promise.all([
      apiFetch('/systems/@me'),
      apiFetch('/systems/@me/switches?limit=1'),
    ]);
    systemData = system;

    // Fronter
    let fronter = null;
    if (switches?.length > 0 && switches[0].members?.length > 0) {
      const fronterIds = switches[0].members.map(x => typeof x === 'string' ? x : x.id);
      const fronterList = (await Promise.all(fronterIds.map(id => apiFetch(`/members/${id}`).catch(() => null)))).filter(Boolean);
      fronter = fronterList.length > 0 ? fronterList : null;
    }

    // Merge fronter into cache (preserve members list from dashboard if present)
    const prev = _loadCache();
    _saveCache({ system, members: prev?.members || [], fronter });

    renderSystemCard(systemData);
    renderFronterCard(fronter);
    renderView(systemData);
  } catch (e) {
    console.error('Boot error:', e);
    if (e.message && (e.message.includes('401') || e.message.includes('403'))) {
      sessionStorage.removeItem('pk_token');
      window.location.href = 'index.html';
    }
  }
}

function _saveCache(data) {
  try { sessionStorage.setItem('pk_cache', JSON.stringify(data)); } catch {}
}

function _loadCache() {
  try {
    const raw = sessionStorage.getItem('pk_cache');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function logout() {
  sessionStorage.removeItem('pk_token');
  window.location.href = 'index.html';
}

boot();
</script>
</body>
</html>
