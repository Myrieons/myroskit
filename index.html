<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYROSKIT — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0d0d0f;
    --bg-secondary: rgba(28, 29, 32, 0.65);
    --bg-tertiary: rgba(33, 34, 38, 0.6);
    --bg-input: rgba(15, 15, 17, 0.6);
    --bg-hover: rgba(38, 39, 44, 0.75);
    --accent: #6b6f76;
    --accent-hover: #55585e;
    --text-primary: #f2f3f5;
    --text-secondary: #b5bac1;
    --text-muted: #80848e;
    --border: rgba(255, 255, 255, 0.08);
    --border-subtle: rgba(255, 255, 255, 0.04);
    --radius: 12px;
    --radius-sm: 6px;
    --shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Logo */
  .wordmark {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    display: block;
  }
  .wordmark .myros { color: #f2f3f5; }
  .wordmark .kit   { color: var(--accent); }

  /* Main */
  .page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .login-card {
    background: var(--bg-secondary);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px;
    width: 100%;
    max-width: 440px;
    box-shadow: var(--shadow);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-header {
    margin-bottom: 24px;
  }

  .disclaimer {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    background: rgba(33, 34, 38, 0.5);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-top: 16px;
  }

  .disclaimer strong {
    color: var(--text-secondary);
    font-weight: 600;
  }

  .error-banner {
    background: rgba(237, 66, 69, 0.15);
    border: 1px solid rgba(237, 66, 69, 0.4);
    border-radius: var(--radius-sm);
    color: #f38ba8;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: rgba(15, 15, 17, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .form-input:focus {
    border-color: rgba(255,255,255,0.2);
    background: rgba(15, 15, 17, 0.7);
  }
  .form-input::placeholder { color: var(--text-muted); }

  .form-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.4;
  }

  .form-hint code {
    background: var(--bg-tertiary);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 20px;
    width: 100%;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    .login-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="login-card">
    <div class="login-header">
      <span class="wordmark"><span class="myros">MYROS</span><span class="kit">KIT</span></span>
    </div>

    <div id="error-msg" class="error-banner"></div>

    <div class="form-group">
      <label class="form-label">PluralKit Token</label>
      <input type="password" id="token-input" class="form-input" placeholder="Paste your token here…" />
      <div class="form-hint">
        Get your token by DMing PluralKit with <code>pk;token</code> on Discord.
      </div>
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="login()">Sign in</button>

    <div class="disclaimer">
      <strong>Your token stays with you.</strong> MYROSKIT uses your PluralKit token only to fetch your system data directly from the PluralKit API. It is stored in your browser's session memory and is never sent to any server, logged, or shared.
    </div>
  </div>
</div>

<script>
const API = 'https://api.pluralkit.me/v2';

// If already logged in, skip to dashboard
if (sessionStorage.getItem('pk_token')) {
  window.location.href = 'dashboard.html';
}

async function login() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) { showError('Please enter your token.'); return; }

  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  btn.disabled = true;
  hideError();

  try {
    const r = await fetch(API + '/systems/@me', { headers: { Authorization: token } });
    if (!r.ok) throw new Error('Unauthorized');
    sessionStorage.setItem('pk_token', token);
    window.location.href = 'dashboard.html';
  } catch {
    showError('Invalid token or network error. Please try again.');
    btn.innerHTML = 'Sign in';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
